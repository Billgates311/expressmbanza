<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mbanza Express | Connexion Chauffeur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #f39c12; --text: #ffffff; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-container { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 25px; }
        .header i { font-size: 50px; color: var(--accent); margin-bottom: 10px; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        .btn-login { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 14px; margin-top: 10px; }
        .footer-links { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: bold; }
        #loader { display: none; color: var(--accent); font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="header">
        <i class="fas fa-user-circle"></i>
        <h2>Chauffeur Mbanza Express</h2>
        <p style="color: #666; font-size: 12px; margin-top: 5px;">Connectez-vous pour commencer vos courses</p>
    </div>

    <div class="group">
        <label>N° de Téléphone</label>
        <input type="tel" id="loginTel" placeholder="Ex: 0844290421"maxlength="10">
    </div>

    <div class="group">
        <label>Code PIN (6 chiffres)</label>
        <input type="password" id="loginPin" placeholder="••••••" maxlength="6">
    </div>

    <button class="btn-login" onclick="connexionChauffeur()">Se Connecter</button>
    
    <div id="loader">Vérification en cours...</div>

    <div class="footer-links">
        Pas encore de compte ? <a href="inscription chauffeur.html">S'inscrire ici</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // Configuration Firebase (identique à ton fichier inscription)
    const firebaseConfig = {
        apiKey: "AIzaSyCzVt01984BB28lInzehcjm4Ltk28eN-Wg",
        authDomain: "mbanza-express.firebaseapp.com",
        projectId: "mbanza-express",
        storageBucket: "mbanza-express.appspot.com",
        messagingSenderId: "182597244795",
        appId: "1:182597244795:web:3ba1dc36800db0374b4fde"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function connexionChauffeur() {
        const tel = document.getElementById('loginTel').value.trim();
        const pin = document.getElementById('loginPin').value.trim();
        const loader = document.getElementById('loader');

        if (!tel || !pin) return alert("Veuillez remplir tous les champs.");

        loader.style.display = "block";

        try {
            // Rechercher le chauffeur dans la collection Firestore
            const docRef = db.collection("chauffeurs").doc(tel);
            const docSnap = await docRef.get();

            if (docSnap.exists) {
                const data = docSnap.data();
                
                // Vérifier si le PIN saisi correspond au PIN enregistré
                if (data.pin === pin) {
                    // Enregistrer le tel dans le localStorage pour rester connecté
                    localStorage.setItem("chauffeur_tel", tel);
                    
                    alert("Connexion réussie !");
                    window.location.href = "index.html";
                } else {
                    alert("Code PIN incorrect.");
                }
            } else {
                alert("Ce numéro de téléphone n'est pas enregistré.");
            }
        } catch (e) {
            alert("Erreur de connexion : " + e.message);
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
