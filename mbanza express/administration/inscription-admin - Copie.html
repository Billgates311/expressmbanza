<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mbanza | Inscription Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-6">

    <div class="max-w-lg mx-auto bg-[#121212] p-8 rounded-3xl border border-[#222]">
        <h2 class="text-2xl font-bold mb-6 text-[#e17306]">NOUVEL ADMINISTRATEUR</h2>
        
        <div class="space-y-4">
            <input type="text" id="nom" placeholder="Nom complet" class="w-full p-4 bg-[#0a0a0a] border border-[#222] rounded-xl outline-none focus:border-[#e17306]">
            <div class="grid grid-cols-2 gap-4">
                <input type="tel" id="telAdmin" placeholder="Numéro (08...)" class="w-full p-4 bg-[#0a0a0a] border border-[#222] rounded-xl outline-none">
                <input type="password" id="pinAdmin" placeholder="PIN (6 chiffres)" maxlength="6" class="w-full p-4 bg-[#0a0a0a] border border-[#222] rounded-xl outline-none">
            </div>
            <input type="email" id="email" placeholder="Email professionnel" class="w-full p-4 bg-[#0a0a0a] border border-[#222] rounded-xl outline-none">
            
            <select id="role" class="w-full p-4 bg-[#0a0a0a] border border-[#222] rounded-xl text-gray-400 outline-none">
                <option value="admin">Administrateur Standard</option>
                <option value="super-admin">Super Administrateur</option>
            </select>

            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="ville" placeholder="Ville de création ?" class="w-full p-4 bg-[#0a0a0a] border border-[#222] rounded-xl outline-none">
                <input type="text" id="dev" placeholder="Surnom développeur ?" class="w-full p-4 bg-[#0a0a0a] border border-[#222] rounded-xl outline-none">
            </div>
        </div>

        <button id="btnCreer" onclick="creerAdmin()" class="w-full mt-8 p-4 bg-[#e17306] rounded-xl font-bold hover:bg-[#b05a04] transition-all">
            ENREGISTRER L'ADMIN
        </button>
    </div>

    <script type="module">
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { db } from './CONFIGURATION OFFICIELLE MBANZA EX.js';

        window.creerAdmin = async () => {
            const btn = document.getElementById('btnCreer');
            
            // Récupération des valeurs
            let tel = document.getElementById('telAdmin').value.trim();
            const nom = document.getElementById('nom').value.trim();
            const pin = document.getElementById('pinAdmin').value.trim();
            
            // Normalisation du téléphone
            if (tel.startsWith('0')) tel = '+243' + tel.substring(1);
            else if (tel.length === 9) tel = '+243' + tel;

            if (!nom || !tel || pin.length !== 6) {
                return alert("Erreur : Nom, Téléphone et PIN (6 chiffres) sont obligatoires !");
            }

            btn.disabled = true;
            btn.innerText = "ENREGISTREMENT...";

            const adminData = {
                nom: nom,
                email: document.getElementById('email').value.trim(),
                role: document.getElementById('role').value,
                pin: pin,
                ville: document.getElementById('ville').value.trim().toLowerCase(),
                dev: document.getElementById('dev').value.trim().toLowerCase(),
                dateAjout: new Date().toLocaleDateString()
            };

            try {
                // Enregistrement avec le numéro comme ID du document
                await setDoc(doc(db, "administrateurs", tel), adminData);
                alert("✅ Administrateur ajouté avec succès !");
                window.location.href = "super-admin-mbanza-Copie.html"; // Remplace par ton nom de fichier final
            } catch (err) {
                console.error(err);
                alert("❌ Erreur : " + err.message);
                btn.disabled = false;
                btn.innerText = "ENREGISTRER L'ADMIN";
            }
        };
    </script>
</body>
</html>
