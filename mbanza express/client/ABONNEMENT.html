<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mbanza Express | Abonnements</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --sidebar-bg: #161616;
            --card-bg: #1c1c1c;
            --accent: #e17306; /* Orange Mbanza */
            --text-dim: #999;
            --success: #27ae60;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: row;
            min-height: 100vh;
        }

        /* --- SIDEBAR / EN-TÊTE FILTRES --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            padding: 30px 20px;
            border-right: 1px solid #222;
            flex-shrink: 0;
        }

        .sidebar h2 { font-size: 18px; color: var(--accent); margin-bottom: 25px; border-left: 3px solid var(--accent); padding-left: 10px; }

        .filter-container { display: flex; flex-direction: column; gap: 10px; }

        .filter-item {
            background: #252525;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .filter-item.active, .filter-item:hover { background: var(--accent); color: white; }

        /* --- ZONE PRINCIPALE --- */
        .main-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-info h1 { font-size: 20px; margin: 0; color: #fff; }

        /* --- GRILLE DYNAMIQUE --- */
        .vehicle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        .vehicle-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .photo-container {
            width: 100%;
            height: 100px;
            background: #333;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-container {
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .info-container h3 { 
            margin: 0 0 6px 0; 
            font-size: 12px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            color: #fff;
        }

        .specs-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 10px;
            color: var(--text-dim);
            font-size: 11px;
        }

        .price-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid #333;
        }

        .price { font-size: 12px; font-weight: bold; color: var(--accent); }

        .btn-action {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 0;
            width: 100%;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-action:active { transform: scale(0.95); }

        /* --- ADAPTATION ÉCRANS LARGES (PC) --- */
        @media (min-width: 768px) {
            .vehicle-grid { gap: 20px; grid-template-columns: repeat(3, 1fr); }
            .photo-container { height: 160px; }
            .info-container { padding: 18px; text-align: left; }
            .info-container h3 { font-size: 16px; white-space: normal; }
            .specs-row { flex-direction: row; font-size: 12px; gap: 15px; margin-bottom: 15px; }
            .price-box { flex-direction: row; justify-content: space-between; padding-top: 15px; }
            .price { font-size: 16px; }
            .btn-action { width: auto; padding: 10px 18px; font-size: 13px; }
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 12px; border-right: none; border-bottom: 1px solid #222; }
            .filter-container { flex-direction: row; overflow-x: auto; gap: 8px; scrollbar-width: none; }
            .filter-container::-webkit-scrollbar { display: none; }
            .filter-item { margin-bottom: 0; white-space: nowrap; padding: 8px 14px; font-size: 12px; flex-shrink: 0; }
            .sidebar h2 { display: none; }
            .vehicle-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
        }

        /* --- DESIGN DE L'OVERLAY PROFESSIONNEL (AMÉLIORATION) --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            padding: 20px;
        }
        .overlay-content {
            background: #141414;
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid #252525;
            position: relative;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .close-overlay {
            position: absolute;
            top: 12px; right: 15px;
            font-size: 22px; color: #777;
            cursor: pointer; transition: 0.2s;
        }
        .close-overlay:hover { color: #fff; }
        
        .ussd-box { display: flex; gap: 10px; margin: 20px 0; }
        .ussd-link {
            flex: 1; padding: 12px; border-radius: 10px;
            font-weight: bold; color: white; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 12px; transition: 0.2s;
        }
        .orange-money { background: #FF6600; }
        .m-pesa { background: #E11B22; }
        .ussd-link:active { transform: scale(0.95); }
        
        .input-wrapper { position: relative; margin: 20px 0 15px 0; }
        .input-wrapper input {
            width: 100%; padding: 14px 45px 14px 15px;
            background: #1f1f1f; border: 1px solid #333;
            border-radius: 8px; color: white; font-size: 13px;
            box-sizing: border-box; transition: 0.3s;
        }
        .input-wrapper input:focus { border-color: var(--accent); outline: none; }
        .input-wrapper i {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); color: #666; cursor: pointer; font-size: 16px;
        }
        .input-wrapper i:hover { color: var(--accent); }
        
        .btn-submit-pay {
            background: var(--accent);
            color: white; border: none; padding: 14px;
            border-radius: 8px; font-size: 13px; font-weight: bold;
            width: 100%; cursor: pointer; transition: 0.2s;
        }
        .btn-submit-pay:active { transform: scale(0.98); }

        #zoneNotifications {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%); width: 90%;
            max-width: 400px; z-index: 99999; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="zoneNotifications"></div>

    <div class="sidebar">
        <h2>Abonnements</h2>
        <div class="filter-container">
            <div class="filter-item active" onclick="window.filtrerOffres('tous', this)"><i class="fas fa-th"></i> Tous</div>
            <div class="filter-item" onclick="window.filtrerOffres('motos', this)"><i class="fas fa-motorcycle"></i> Motos</div>
            <div class="filter-item" onclick="window.filtrerOffres('voitures', this)"><i class="fas fa-car"></i> Voitures</div>
            <div class="filter-item" onclick="window.filtrerOffres('vip', this)"><i class="fas fa-crown"></i> VIP</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header-info">
            <h1>Espace Abonnement</h1>
            <div id="countOffres" style="font-size: 13px; color: var(--text-dim); font-weight: 500;">Chargement...</div>
        </div>

        <div class="vehicle-grid" id="containerOffres"></div>

        <p style="text-align:center; margin-top:40px;">
            <a href="index.html" style="color:var(--accent); text-decoration:none; font-size: 13px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px;">
                <i class="fas fa-arrow-left"></i> Quitter la boutique
            </a>
        </p>
    </div>

    <div id="popupPaiement" class="overlay">
        <div class="overlay-content">
            <span class="close-overlay" onclick="fermerFenetrePaiement()">&times;</span>
            <h3 id="titreForfaitPay" style="margin: 0 0 5px 0; color: #fff; font-size: 16px; text-transform: uppercase;">Activation</h3>
            <p style="color: #aaa; font-size: 12px; margin-bottom: 15px;">
                Effectuez le dépôt de <strong id="montantForfaitPay" style="color: var(--accent);">0 FC</strong> via l'un des réseaux ci-dessous, puis collez la référence.
            </p>
            
            <div class="ussd-box">
                <a id="lienOrange" href="#" class="ussd-link orange-money"><i class="fas fa-phone-alt"></i> Orange Money</a>
                <a id="lienMpesa" href="#" class="ussd-link m-pesa"><i class="fas fa-phone-alt"></i> M-Pesa</a>
            </div>
            
            <div class="input-wrapper">
                <input type="text" id="idTransactionInput" placeholder="Entrez ou collez la référence SMS ici">
                <i class="fas fa-paste" onclick="collerDepuisPressePapier()" title="Coller"></i>
            </div>
            
            <button class="btn-submit-pay" onclick="validerFormulairePaiement()">ACTIVER MON ABONNEMENT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzVt01984BB28lInzehcjm4Ltk28eN-Wg",
            authDomain: "mbanza-express.firebaseapp.com",
            projectId: "mbanza-express",
            storageBucket: "mbanza-express.appspot.com",
            messagingSenderId: "182597244795",
            appId: "1:182597244795:web:3ba1dc36800db0374b4fde"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.listeOffresGlobal = []; 
        window.categorieActuelle = 'tous';
        
        // Stockage des infos de commande temporaires
        let commandeEnCours = { nom: "", prix: 0, trajets: 0 };

        const clientTel = localStorage.getItem('userTel');
        if(!clientTel) {
            window.location.href = "connexion.html";
        }

        onSnapshot(collection(db, "offres_abonnements"), (snapshot) => {
            window.listeOffresGlobal = [];
            snapshot.forEach((doc) => {
                window.listeOffresGlobal.push({ id: doc.id, ...doc.data() });
            });
            rafraichirAffichage();
        });

        function rafraichirAffichage() {
            if (window.categorieActuelle === 'tous') {
                genererGrille(window.listeOffresGlobal);
            } else {
                const offresFiltrees = window.listeOffresGlobal.filter(o => {
                    return (o.categorie || "").toLowerCase() === window.categorieActuelle.toLowerCase();
                });
                genererGrille(offresFiltrees);
            }
        }

        function genererGrille(data) {
            const container = document.getElementById('containerOffres');
            const countBox = document.getElementById('countOffres');
            container.innerHTML = "";
            countBox.innerText = data.length + " Forfait(s) disponible(s)";

            if(data.length === 0) {
                container.innerHTML = `<p style="grid-column: span 3; text-align:center; color:var(--text-dim); font-size:13px; padding:40px 0;">Aucun forfait disponible.</p>`;
                return;
            }

            data.forEach((o) => {
                const card = document.createElement('div');
                card.className = "vehicle-card";
                const nbrTrajets = o.valeur_forfait || 0;
                const description = o.option || "Standard";
                const prixForfait = Number(o.prix || 0);

                card.innerHTML = `
                    <div class="photo-container">
                        <img src="${o.photo || 'https://via.placeholder.com/500'}" alt="${o.titre}">
                    </div>
                    <div class="info-container">
                        <h3>${o.titre || 'Forfait Sans Nom'}</h3>
                        <div class="specs-row">
                            <span><i class="fas fa-ticket-alt"></i> <strong>${nbrTrajets} trajets</strong></span>
                            <span><i class="fas fa-cogs"></i> ${description}</span>
                        </div>
                        <div class="price-box">
                            <div class="price">${prixForfait.toLocaleString('fr-FR')} FC</div>
                            <button class="btn-action">S'abonner</button>
                        </div>
                    </div>
                `;
                
                card.querySelector('.btn-action').onclick = function() {
                    window.commanderForfait(o.titre || 'Forfait', prixForfait, nbrTrajets);
                };
                container.appendChild(card);
            });
        }

        // MODIFICATION : Ouvre la pop-up au lieu d'un prompt
        window.commanderForfait = function(nomPack, prixPack, nbrTrajets) {
            commandeEnCours = { nom: nomPack, prix: parseInt(prixPack), trajets: parseInt(nbrTrajets) };
            
            document.getElementById('titreForfaitPay').innerText = nomPack;
            document.getElementById('montantForfaitPay').innerText = commandeEnCours.prix.toLocaleString('fr-FR') + " FC";
            
            // Configuration dynamique des numéros de transfert Marchand/Dépôt Mbanza Express
            document.getElementById('lienOrange').href = `tel:*144*1*1*0897820309*${commandeEnCours.prix}%23`;
            document.getElementById('lienMpesa').href = `tel:*1122*1*1*0812555353*${commandeEnCours.prix}%23`;
            
            document.getElementById('idTransactionInput').value = "";
            document.getElementById('popupPaiement').style.display = 'flex';
        };

        window.fermerFenetrePaiement = function() {
            document.getElementById('popupPaiement').style.display = 'none';
        };

        window.collerDepuisPressePapier = async function() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('idTransactionInput').value = text;
            } catch (err) {
                console.log("Copie automatique non supportée.");
            }
        };

        // Soumission finale vers la base de données après validation dans l'Overlay
        window.validerFormulairePaiement = async function() {
            const ref = document.getElementById('idTransactionInput').value.trim();
            if(!ref) {
                alert("❌ L'identifiant de la transaction est obligatoire.");
                return;
            }

            try {
                await addDoc(collection(db, "recharges_en_attente"), {
                    client_tel: clientTel,
                    pack: commandeEnCours.nom,
                    montant_a_ajouter: commandeEnCours.prix,
                    transaction_id: ref,
                    type_forfait: "trajet",  
                    type_demande: "trajet", 
                    valeur_forfait: commandeEnCours.trajets,   
                    statut: "en_attente",
                    date: serverTimestamp()
                });

                alert(`✅ Demande envoyée !\n\nRéférence enregistrée : ${ref}.\nValidation en cours.`);
                window.fermerFenetrePaiement();
            } catch (error) {
                alert("Erreur lors de l'envoi : " + error.message);
            }
        };

        window.filtrerOffres = function(categorie, element) {
            window.categorieActuelle = categorie;
            document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            rafraichirAffichage();
        };

        // --- GESTIONNAIRE DE NOTIFICATIONS FLUIDE ET SÉCURISÉ ---
        let fileAttenteNotifs = [];
        let notificationEnCoursDaffichage = false;

        const qNotif = query(
            collection(db, "notifications_privees"),
            where("destinataire", "==", clientTel),
            where("lu", "==", false)
        );

        onSnapshot(qNotif, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    fileAttenteNotifs.push({ id: change.doc.id, info: change.doc.data() });
                    traiterFileAttenteNotif();
                }
            });
        });

        function traiterFileAttenteNotif() {
            if (notificationEnCoursDaffichage || fileAttenteNotifs.length === 0) return;

            notificationEnCoursDaffichage = true;
            const prochaineNotif = fileAttenteNotifs.shift(); 
            const data = prochaineNotif.info;
            const docId = prochaineNotif.id;

            const notifBox = document.createElement('div');
            notifBox.id = `notif-${docId}`;
            notifBox.style.cssText = "pointer-events: auto; background: #e17306; color: white; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; position: relative; animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); word-wrap: break-word; overflow-wrap: break-word;";

            notifBox.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px; padding-right: 20px;">
                    <i class="fas fa-rocket" style="font-size: 20px;"></i>
                    <div style="flex: 1;">
                        <h4 style="margin: 0; font-size: 14px; font-weight: bold;">${data.titre || 'MBANZA EXPRESS 🚀'}</h4>
                        <p style="margin: 3px 0 0; font-size: 12px; opacity: 0.95; line-height: 1.3;">${data.message || ''}</p>
                    </div>
                </div>
                ${data.code ? `
                <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 8px; margin-top: 5px;">
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-size: 9px; opacity: 0.7; text-transform: uppercase;">Code Abonnement</span>
                        <strong style="font-size: 15px; color: #fff; letter-spacing: 1px;">${data.code}</strong>
                    </div>
                    <button onclick="copierCodeNotif('${data.code}', this)" style="background: #ffffff; color: #e17306; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;">
                        <i class="fas fa-copy"></i> COPIER
                    </button>
                </div>
                ` : ''}
                <div onclick="fermerNotifPro('${docId}')" style="position: absolute; top: 10px; right: 12px; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 16px; transition: 0.2s;">
                    <i class="fas fa-times-circle"></i>
                </div>
            `;

            document.getElementById('zoneNotifications').appendChild(notifBox);
        }

        window.fermerNotifPro = async function(docId) {
            const box = document.getElementById(`notif-${docId}`);
            if (box) {
                box.style.transform = 'translateY(-20px)';
                box.style.opacity = '0';
                box.style.transition = '0.4s';
                setTimeout(() => { 
                    box.remove(); 
                    notificationEnCoursDaffichage = false;
                    traiterFileAttenteNotif();
                }, 400);
            } else {
                notificationEnCoursDaffichage = false;
                traiterFileAttenteNotif();
            }

            try {
                await updateDoc(doc(db, "notifications_privees", docId), { lu: true });
            } catch (e) {
                console.error(e);
            }
        };

        window.copierCodeNotif = function(code, btn) {
            navigator.clipboard.writeText(code).then(() => {
                btn.style.background = "#2ecc71";
                btn.style.color = "#ffffff";
                btn.innerHTML = `<i class="fas fa-check"></i> COPIÉ !`;
                setTimeout(() => {
                    btn.style.background = "#ffffff";
                    btn.style.color = "#e17306";
                    btn.innerHTML = `<i class="fas fa-copy"></i> COPIER`;
                }, 2000);
            });
        };
    </script>
</body>
</html>
