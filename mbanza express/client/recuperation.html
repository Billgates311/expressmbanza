<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Récupération PIN | Mbanza Express</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e17306; --primary-dark: #d35400; --bg: #000000; --surface: #111111; --input-border: #222222; --text-main: #ffffff; --text-dim: #888888; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Outfit', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        body::before { content: ""; position: absolute; top: -10%; left: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(225, 115, 6, 0.12) 0%, transparent 70%); z-index: -1; }
        .card { background: var(--surface); padding: 35px 25px; border-radius: 30px; width: 100%; max-width: 390px; border: 1px solid var(--input-border); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .step-bar { width: 35px; height: 4px; background: #222; border-radius: 2px; transition: all 0.3s ease; }
        .step-bar.active { background: var(--primary); width: 50px; }
        .step-icon { font-size: 36px; color: var(--primary); margin-bottom: 15px; background: rgba(225, 115, 6, 0.05); width: 70px; height: 70px; line-height: 70px; border-radius: 50%; display: inline-block; border: 1px solid rgba(225, 115, 6, 0.1); }
        h2 { font-size: 24px; font-weight: 800; margin: 0 0 8px 0; }
        p { color: var(--text-dim); font-size: 14px; margin: 0 0 20px 0; }
        .input-wrapper { position: relative; display: flex; align-items: center; background: #000; border: 1px solid var(--input-border); border-radius: 18px; margin-bottom: 15px; transition: all 0.3s ease; }
        .input-wrapper:focus-within { border-color: var(--primary); }
        .input-wrapper i { padding: 0 15px; color: #444; }
        input { background: transparent; border: none; color: white; padding: 16px 15px 16px 0; width: 100%; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 18px; background: var(--primary); border: none; color: black; font-weight: 800; border-radius: 18px; cursor: pointer; transition: all 0.3s ease; }
        .btn:disabled { background: #222; color: #555; }
        .hidden { display: none; }
        .footer-links { margin-top: 25px; }
        .link-muted { color: #555; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div class="step-indicator">
        <div id="bar1" class="step-bar active"></div>
        <div id="bar2" class="step-bar"></div>
        <div id="bar3" class="step-bar"></div>
    </div>

    <div class="step-icon"><i class="fas fa-shield-alt"></i></div>
    <h2>Récupérer mon PIN</h2>
    
    <div id="step1">
        <p>Entrez votre numéro de téléphone pour identifier votre compte.</p>
        <div class="input-wrapper">
            <i class="fas fa-phone"></i>
            <input type="tel" id="recupTel" placeholder="Ex: 0844290421" maxlength="15">
        </div>
        <button class="btn" id="btnStep1" onclick="verifierUtilisateur()">SUIVANT</button>
    </div>

    <div id="step2" class="hidden">
        <p>Répondez à la question de sécurité :</p>
        <p id="labelQuestion" style="font-weight: 600; color: var(--primary); font-size: 15px;"></p>
        <div class="input-wrapper">
            <i class="fas fa-pen"></i>
            <input type="text" id="reponseSaisie" placeholder="Votre réponse" maxlength="30">
        </div>
        <button class="btn" id="btnStep2" onclick="verifierReponse()">CONFIRMER LA RÉPONSE</button>
    </div>

    <div id="step3" class="hidden">
        <p style="color: var(--primary);">Définissez votre nouveau code PIN</p>
        <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="nouveauPin" placeholder="Nouveau PIN (4 chiffres)" maxlength="4" inputmode="numeric">
        </div>
        <button class="btn" id="btnSavePin" onclick="sauvegarderNouveauPin()">ENREGISTRER LE NOUVEAU PIN</button>
    </div>

    <div class="footer-links">
        <a href="connexion.html" id="cancelBtn" class="link-muted">Retour à la connexion</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzVt01984BB28lInzehcjm4Ltk28eN-Wg",
        authDomain: "mbanza-express.firebaseapp.com",
        projectId: "mbanza-express",
        storageBucket: "mbanza-express.firebasestorage.app",
        messagingSenderId: "182597244795",
        appId: "1:182597244795:web:3ba1dc36800db0374b4fde"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let telephoneFormateValide = null;

    const questionsLibelles = { "ecole": "Nom de votre école primaire ?", "surnom": "Surnom d'enfance ?", "ville": "Ville de naissance ?" };

    function formaterNumeroRDC(numero) {
        let net = numero.replace(/\s+/g, '').trim();
        if (net.startsWith('0')) return '+243' + net.substring(1);
        if (net.startsWith('8') || net.startsWith('9')) return '+243' + net;
        return net;
    }

    window.verifierUtilisateur = async function() {
        const telSaisi = document.getElementById('recupTel').value.trim();
        if (!telSaisi) return alert("Entrez votre téléphone.");
        const telFormate = formaterNumeroRDC(telSaisi);
        const btn = document.getElementById('btnStep1');
        btn.disabled = true;
        try {
            const userSnap = await getDoc(doc(db, "utilisateurs", telFormate));
            if (userSnap.exists()) {
                telephoneFormateValide = telFormate;
                document.getElementById('labelQuestion').innerText = questionsLibelles[userSnap.data().question_id] || "Question inconnue";
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('bar1').classList.remove('active');
                document.getElementById('bar2').classList.add('active');
            } else { alert("Compte introuvable."); }
        } finally { btn.disabled = false; }
    };

    window.verifierReponse = async function() {
        const saisie = document.getElementById('reponseSaisie').value.toLowerCase().trim();
        const btn = document.getElementById('btnStep2');
        btn.disabled = true;
        try {
            const userSnap = await getDoc(doc(db, "utilisateurs", telephoneFormateValide));
            if (userSnap.exists() && saisie === userSnap.data().reponse_secrete.toLowerCase().trim()) {
                if (userSnap.data().actif === false) return alert("Compte suspendu.");
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
                document.getElementById('bar2').classList.remove('active');
                document.getElementById('bar3').classList.add('active');
            } else { alert("Réponse incorrecte."); }
        } finally { btn.disabled = false; }
    };

    window.sauvegarderNouveauPin = async function() {
        const nouveauPin = document.getElementById('nouveauPin').value.trim();
        const btn = document.getElementById('btnSavePin');
        if (nouveauPin.length !== 4 || isNaN(nouveauPin)) return alert("Code 4 chiffres requis.");
        btn.disabled = true;
        try {
            await updateDoc(doc(db, "utilisateurs", telephoneFormateValide), { mot_de_passe: nouveauPin });
            alert("PIN enregistré avec succès !");
            window.location.href = "connexion.html";
        } catch (error) {
            console.error(error);
            alert("Erreur : " + error.message);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
